services:
  oracle-db:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    platform: linux/amd64
    container_name: oracle-flights
    ports:
      - "1521:1521"
    env_file:
      - .env
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "bash -c \"echo 'SELECT open_mode FROM v\\$$database;' | sqlplus -s system/$$ORACLE_PWD@//localhost:1521/XEPDB1 | grep -q 'READ WRITE'\""]
      interval: 15s
      timeout: 15s
      retries: 20
      start_period: 120s

  db-init:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    platform: linux/amd64
    container_name: flights-db-init
    depends_on:
      oracle-db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./db/init:/init
    command: >
      bash -c "sqlplus system/$$ORACLE_PWD@oracle-db:1521/XEPDB1 @/init/00_create_user.sql
      && sqlplus $$DB_USER/$$DB_PASSWORD@oracle-db:1521/XEPDB1 @/init/01_ddl.sql
      && sqlplus $$DB_USER/$$DB_PASSWORD@oracle-db:1521/XEPDB1 @/init/denormalization.sql
      && sqlplus $$DB_USER/$$DB_PASSWORD@oracle-db:1521/XEPDB1 @/init/02_insert.sql
      && sqlplus $$DB_USER/$$DB_PASSWORD@oracle-db:1521/XEPDB1 @/init/04_analytics_views.sql"
    restart: "no"

  app:
    build: ./flights-app
    container_name: flights-app
    depends_on:
      oracle-db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DB_URL: jdbc:oracle:thin:@oracle-db:1521/XEPDB1
    ports:
      - "8080:8080"
    stdin_open: true
    tty: true
    restart: on-failure

  frontend:
    build: ./flights-frontend
    container_name: flights-frontend
    ports:
      - "5173:5173"
    depends_on:
      - app
    restart: on-failure

volumes:
  oracle-data:
